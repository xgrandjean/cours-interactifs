<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Redirection…</title>
  <script>
    // Doit être inline : config.js pas encore chargé
    var _base = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? '' : '/cours-interactifs';
  </script>
  <script>document.write('<script src="' + _base + '/src/js/config.js"><\/script>')</script>
  <script>document.write('<script src="' + _base + '/src/js/parcours.js"><\/script>')</script>
  <script>
    (function () {
      var path = window.location.pathname;

      if (path.indexOf('/admin') !== -1) {
        window.location.replace(BASE + '/src/html/teacher-login.html');
        return;
      }

      var slug = window.Parcours ? window.Parcours.slug : null;
      var token = window.Parcours ? window.Parcours.token : null;

      if (slug) {
        if (token) {
          // Rediriger directement vers le 1er chapitre (évite boucle infinie)
          window.location.replace(BASE + '/parcours/src/' + slug + '/chapters/chapitre1.html');
        } else {
          window.location.replace(BASE + '/src/html/login.html?parcours=' + slug);
        }
        return;
      }

      window.location.replace(BASE + '/src/html/login.html');
    })();
  </script>
</head>

</html>
