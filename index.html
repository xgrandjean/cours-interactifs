<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cours Interactifs</title>
  <!--
    PAGE TECHNIQUE DE ROUTING UNIQUEMENT.
    Les élèves n'arrivent jamais ici directement :
    - Leur lien est : monsite.com/cours-interactifs/parcours/nsi-term?token=STU001
    - GitHub Pages renvoie un 404 → 404.html encode l'URL dans ?r=
      et redirige ici → parcours.js restaure l'URL propre
      → le script ci-dessous redirige vers le bon parcours.

    Si quelqu'un arrive sur la racine sans slug (URL tapée à la main),
    on n'affiche RIEN — pas de liste de parcours.
    Seul le formateur connaît l'URL teacher/.
  -->
  <base href="/cours-interactifs/">
  <script src="src/js/parcours.js"></script>
</head>
<body>
  <script>
    (function () {
      var slug = Parcours.slug;

      if (slug) {
        // Redirection post-404 GitHub Pages vers le bon parcours
        var target = 'parcours/' + slug + '/';
        if (Parcours.token) target += '?token=' + Parcours.token;
        window.location.replace(target);
      }
      // Pas de slug → on n'affiche rien, page blanche.
      // Le formateur accède à /cours-interactifs/teacher/ directement.
    })();
  </script>
</body>
</html>
