<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcours Pédagogique - Cours Interactifs</title>
    <link rel="stylesheet" href="./src/assets/css/style.css">
    <link rel="stylesheet" href="./src/assets/css/index.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Parcours Pédagogique</h1>
            <p class="subtitle">Apprenez pas à pas avec des QCM interactifs</p>
        </div>
    </header>

    <main class="container">
        <div id="student-info" class="student-info" style="display: none;">
            <div class="welcome-message">
                <div class="student-details">
                    <div class="student-info-left">
                        <span class="student-name"></span>
                        <span class="student-class"></span>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary">Se Déconnecter</button>
                </div>
            </div>
        </div>

        <section class="course-grid">
            <h2>Chapitres</h2>
            <div class="chapters">
                <!-- Les chapitres seront injectés dynamiquement -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 - Site pédagogique interactif</p>
        </div>
    </footer>

    <script src="./src/js/storage.js"></script>
    <script src="./src/js/dataStorage.js"></script>
    <script src="./src/js/chapterDetector.js"></script>
    <script src="./src/js/main.js"></script>
    <script src="./src/js/progressManager.js"></script>
    <script src="./src/js/chapitre.js"></script>
    <script src="./src/js/index.js"></script>

    <script>
    // Fonction wrapper pour afficher le détail d'un chapitre depuis index.html
    // Elle utilise showDetailsBilanChapter de chapitre.js en définissant le chapitre cible
    async function showChapterDetails(chapterId) {
        console.log('showChapterDetails appelé avec chapterId:', chapterId);
        
        // Définir currentChapterId pour que showDetailsBilanChapter puisse l'utiliser
        if (typeof window.setCurrentChapterId === 'function') {
            window.setCurrentChapterId(chapterId);
        } else {
            console.error('setCurrentChapterId non disponible');
            alert('Erreur: fonction de définition du chapitre non disponible.');
            return;
        }
        
        // Charger la configuration des chapitres si ce n'est pas déjà fait
        if (!window.chaptersIndex) {
            try {
                const response = await fetch('./src/chapters/chapters_index.json');
                if (response.ok) {
                    window.chaptersIndex = await response.json();
                    console.log('chaptersIndex chargé:', window.chaptersIndex);
                } else {
                    console.error('Erreur chargement JSON:', response.status);
                }
            } catch (error) {
                console.error('Erreur chargement chapters_index.json:', error);
            }
        }
        
        // Récupérer le token de session
        const token = sessionStorage.getItem('current_student_token');
        if (!token) {
            alert('Veuillez vous connecter pour voir votre progression.');
            return;
        }
        
        // Récupérer la progression de l'apprenant
        const progressKey = `student_${token}_progress`;
        const progressData = await storage.get(progressKey) || {};
        console.log('Progression récupérée:', progressData);
        
        // Définir currentProgress pour que showDetailsBilanChapter puisse l'utiliser
        if (typeof window.setCurrentProgress === 'function') {
            window.setCurrentProgress(progressData);
        } else {
            console.error('setCurrentProgress non disponible');
            alert('Erreur: fonction de définition de la progression non disponible.');
            return;
        }
        
        // Vérifier que le chapitre existe dans la progression
        const chapterProgress = progressData.chapters?.[chapterId];
        if (!chapterProgress) {
            // Initialiser une structure vide pour le chapitre
            progressData.chapters = progressData.chapters || {};
            progressData.chapters[chapterId] = {
                questions: {},
                questionCount: 0,
                answeredQuestions: 0,
                correctQuestions: 0
            };
            // Mettre à jour currentProgress avec la nouvelle structure
            window.setCurrentProgress(progressData);
        }
        
        // Appeler showDetailsBilanChapter qui utilisera les variables globales définies
        if (typeof showDetailsBilanChapter === 'function') {
            showDetailsBilanChapter();
        } else {
            alert('Fonction de détail non disponible.');
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const auth = new DataStorage();
        const token = sessionStorage.getItem(auth.SESSION_KEY);
        const student = token ? await auth.findUserByToken(token) : null;

        if (!student) {
            window.location.href = 'src/html/login.html';
            return;
        }

        // Afficher les infos utilisateur
        document.getElementById('student-info').style.display = 'block';
        document.querySelector('.student-name').textContent = student.name;
        document.querySelector('.student-class').textContent = student.class || '';

        // Bouton déconnexion
        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem(auth.SESSION_KEY);
            window.location.href = 'src/html/login.html';
        });

        // ✅ INITIALISER LE DASHBOARD SEULEMENT APRES AUTH REUSSIE !
        // C'est ici que l'on appelle StudentDashboard, JAMAIS avant.
        // Plus de race condition, plus de code qui s'exécute avant redirection
        if (window.StudentDashboard) {
            new window.StudentDashboard();
        }
    });
    </script>
</body>
</html>
