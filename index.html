<!-- /index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cours Interactifs</title>
  <script>
    (function() {
      var base = '/';
      if (window.location.pathname.indexOf('/cours-interactifs/') === 0) {
        base = '/cours-interactifs/';
      }
      document.write('<base href="' + base + '">');
    })();
  </script>
  <script src="src/js/parcours.js"></script>
</head>
<body>
  <script>
    (function () {
      var slug = window.Parcours ? window.Parcours.slug : null;
      var base = document.querySelector('base').getAttribute('href');
      
      if (slug) {
        // ✅ CAS 1 : Un slug existe → redirection vers le parcours
        var target = 'parcours/src/' + slug + '/';
        if (window.Parcours && window.Parcours.token) {
          target += '?token=' + window.Parcours.token;
        }
        console.log('[Index] Parcours détecté :', slug, '→ redirection vers', target);
        window.location.replace(target);
      } else {
        // ✅ CAS 2 : Pas de slug → redirection vers l'espace formateur
        var isAlreadyTeacher = window.location.pathname.indexOf('/teacher/') !== -1;
        
        if (!isAlreadyTeacher) {
          var teacherUrl = base + 'teacher/';
          console.log('[Index] Aucun parcours, redirection formateur :', teacherUrl);
          window.location.replace(teacherUrl);
        }
      }
    })();
  </script>
</body>
</html>
