<!-- index.html-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cours Interactifs</title>
  <script src="src/js/config.js"></script>
  <script src="src/js/parcours.js"></script>
</head>
<body>
  <script>
    (function () {
      var path = window.location.pathname;

      if (path.indexOf('/admin') !== -1) {
        window.location.replace(BASE + '/src/html/teacher-login.html');
        return;
      }

      // Cette page sert uniquement de point d'entrée racine (login/404 fallback).
      // Les redirections vers les slugs (parcours/src/{slug}/) sont gérées par
      // login.html (après connexion) qui redirige directement vers chapitre1.html.
      var slug = window.Parcours ? window.Parcours.slug : null;
      var token = window.Parcours ? window.Parcours.token : null;

      if (slug && token) {
        // Déjà authentifié → rediriger vers le 1er chapitre (évite boucle 404)
        window.location.replace(BASE + '/parcours/src/' + slug + '/chapters/chapitre1.html');
      } else if (slug) {
        window.location.replace(BASE + '/src/html/login.html?parcours=' + slug);
      } else {
        window.location.replace(BASE + '/src/html/login.html');
      }
    })();
  </script>
</body>
</html>
