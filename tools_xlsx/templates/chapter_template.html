<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapitre</title>
    <link rel="icon" href="data:,">

    <script>
    var _base = ['localhost', '127.0.0.1'].includes(window.location.hostname) ? '' : '/cours-interactifs';

    document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/style.css">');
    document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/chapitre.css">');
    document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/chapter-bilan.css">');

    document.write('<script src="' + _base + '/src/js/config.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/parcours.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/storage.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/dataStorage.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/main.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/progressManager.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/core/getExamContext.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/core/chapterSession.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/studentWorkEditor.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapter/chapterUI.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapter/chapterSubmission.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapter/chapterBilan.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapitre.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/correctionModal.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/studentCorrectionModal.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapterInit.js"><\/script>');
    </script>
</head>
<body class="chapter-page">
    <div class="container">
        <header class="chapter-header">
            <div class="chapter-header-spacer"></div>
            <div class="chapter-header-content">
                <h1 id="chapter-title">Chargement...</h1>
            </div>
            <div class="chapter-progress-circle" id="chapterProgressCircle">
                <div class="progress-percent-bg">%</div>
                <div class="progress-percent-bg-dup0">%</div>
                <div class="progress-percent-bg-dup1">%</div>
                <div class="progress-value" id="chapterProgressValue">0</div>
            </div>
        </header>

        <div id="student-info" class="student-info" style="display: none;">
            <div class="welcome-message">
                <div class="student-details">
                    <div class="student-info-left">
                        <span class="student-name"></span>
                        <span class="student-class"></span>
                    </div>
                    <div class="chapter-nav">
                        <button id="back-to-menu" class="btn btn-secondary">
                            ← Retour au menu
                        </button>
                        <button id="logout-btn" class="btn btn-secondary">
                            Se déconnecter
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <main class="chapter-content">
            <div class="loader" id="chapter-loader">Chargement du chapitre...</div>
        </main>

        <footer class="chapter-footer"></footer>
    </div>

    <script>document.write('<script type="module" src="' + _base + '/src/js/cours-loader.js"><\/script>')</script>
    <script type="module">
        // Note: getChapitre est chargé via le script module ci-dessus (avec _base)
        // Il est disponible sur window.getChapitre

        const urlParams = new URLSearchParams(window.location.search);
        const parcoursSlug = urlParams.get('parcours');
        const chapitreId   = urlParams.get('chapitre');

        if (!parcoursSlug || !chapitreId) {
            window.location.href = (window.BASE || '') + '/src/html/user.html?parcours=' + parcoursSlug;
        }

        // Variables globales pour chapitre.js et progressManager.js
        window.currentParcoursSlug = parcoursSlug;
        window.currentChapitreId   = parseInt(chapitreId);

        const chapitre = await window.getChapitre(parcoursSlug, chapitreId);

        if (!chapitre) {
            document.getElementById('chapter-loader').textContent = '❌ Chapitre introuvable.';
        } else {
            // Titre
            document.getElementById('chapter-title').textContent = chapitre.title;
            document.title = chapitre.title;

            // Injection du contenu HTML du chapitre
            const main = document.querySelector('.chapter-content');
            // Récupérer le HTML des questions et des cours
            const questionsHtml = chapitre.questions?.map(q => q.html).join('') || '';
            const coursesHtml = chapitre.courses?.map(c => c.html).join('') || '';
            const globalValidation = `
                <div class="global-validation hidden">
                    <button class="btn btn-primary" onclick="window.studentWorkEditor.validateAllQuestions()">
                        ✅ Valider toutes les réponses
                    </button>
                    <div id="global-feedback" class="feedback"></div>
                </div>
            `;
            main.innerHTML = questionsHtml + coursesHtml + globalValidation;
        }

        document.getElementById('back-to-menu').onclick = () => {
            window.location.href = (window.BASE || '') + '/src/html/user.html?parcours=' + parcoursSlug;
        };

        // Déclencher chapitre.js après injection du contenu
        if (typeof initChapterPage === 'function') {
            await initChapterPage();
        }
    </script>
</body>
</html>
