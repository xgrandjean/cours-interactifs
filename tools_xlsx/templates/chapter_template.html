<!-- chapter_template.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <link rel="icon" href="data:,">
    
    <script>
    // Détection d'environnement inline
    var _base = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? '' : '/cours-interactifs';
    
    // Styles
    document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/style.css">');
    document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/chapitre.css">');
    document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/chapter-bilan.css">');
    
    
    // ✅ PARCOURS.JS EN PREMIER (sans defer pour qu'il soit disponible tout de suite)
    document.write('<script src="' + _base + '/src/js/parcours.js"><\/script>');

    // Scripts
    document.write('<script src="' + _base + '/src/js/storage.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/dataStorage.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/main.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/progressManager.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/core/getExamContext.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/core/chapterSession.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/studentWorkEditor.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapter/chapterUI.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapter/chapterSubmission.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapter/chapterBilan.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapitre.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/correctionModal.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/studentCorrectionModal.js"><\/script>');
    document.write('<script src="' + _base + '/src/js/chapterInit.js"><\/script>');
    </script>
</head>
<body class="chapter-page">
    <div class="container">
        <header class="chapter-header">
            <div class="chapter-header-spacer"></div>
            <div class="chapter-header-content">
                <h1>{title}</h1>
            </div>
            <div class="chapter-progress-circle" id="chapterProgressCircle">
                <div class="progress-percent-bg">%</div>
                <div class="progress-percent-bg-dup0">%</div>
                <div class="progress-percent-bg-dup1">%</div>
                <div class="progress-value" id="chapterProgressValue">0</div>
            </div>
        </header>         

        <div id="student-info" class="student-info" style="display: none;">
            <div class="welcome-message">
                <div class="student-details">
                    <div class="student-info-left">
                        <span class="student-name"></span>
                        <span class="student-class"></span>
                    </div>
                    <div class="chapter-nav">
                        <button id="back-to-menu" class="btn btn-secondary">
                            ← Retour au menu
                        </button>
                        <button id="logout-btn" class="btn btn-secondary">
                            Se déconnecter
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <main class="chapter-content">
            {content}
        </main>
        
        <footer class="chapter-footer">
        </footer>
    </div>
</body>
</html>
