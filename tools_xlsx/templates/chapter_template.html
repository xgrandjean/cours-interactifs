<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <link rel="icon" href="data:,">
    <script src="src/js/config.js"></script>
    <script>
    (function() {
      var el = document.createElement('base');
      el.href = (window.BASE || '') + '/';
      document.head.appendChild(el);
    })();
    </script>
    <script src="src/js/parcours.js"></script>
    <script>
    (function() {
        if (!Parcours.token) {
            window.location.replace(Parcours.loginUrl);
        }
    })();
    </script>
    <link rel="stylesheet" href="src/assets/css/style.css">
    <script src="src/js/storage.js" defer></script>
    <script src="src/js/dataStorage.js" defer></script>
    <script src="src/js/main.js" defer></script>
</head>
<body class="chapter-page">
    <div class="container">
        <header class="chapter-header">
            <h1>{title}</h1>
            <div class="chapter-nav">
                <button class="btn btn-secondary"
                        onclick="window.location.href=Parcours.homeUrl">
                    ← Retour au menu
                </button>
                {next_chapter_link}
            </div>
        </header>

        <main class="chapter-content">
            {content}
        </main>

        <footer class="chapter-footer">
            <div class="progress-actions">
                <button class="btn btn-primary"
                        onclick="window.location.href=Parcours.homeUrl">
                    Retour au menu
                </button>
                {next_chapter_button}
            </div>
        </footer>
    </div>
</body>
</html>
