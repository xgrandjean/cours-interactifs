<!-- chapter_template.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/chapitre.css">

    <script src="../js/storage.js" defer></script>
    <script src="../js/dataStorage.js" defer></script>
    <script src="../js/main.js" defer></script>
    <script src="../js/progressManager.js" defer></script>
    <script src="../js/chapitre.js" defer></script>
    <script src="../js/teacherView.js" defer></script>
    <script defer>
    document.addEventListener('DOMContentLoaded', async () => {{
        const auth = new DataStorage();

        // Vérifier si c'est une vue formateur (teacher_view)
        const urlParams = new URLSearchParams(window.location.search);
        const isTeacherView = urlParams.get('teacher_view') === 'true';
        const teacherStudentId = urlParams.get('student_id');

        let student = null;

        if (isTeacherView && teacherStudentId) {{
            // Mode formateur : charger les données de l'apprenant spécifié
            console.log('[Inline Script] Mode formateur détecté - student_id:', teacherStudentId);
            console.log('[Inline Script] URL actuelle:', window.location.href);
            
            // Récupérer l'apprenant depuis DataStorage
            const users = await auth.getUsers();
            student = users.find(u => u.id === teacherStudentId);
            
            if (!student) {{
                alert('Apprenant introuvable');
                // Fermer le modal iframe
                if (window.parent && window.parent.dashboard) {{
                    window.parent.dashboard.closeStudentChapterView();
                }}
                return;
            }}
            
            // Désactiver TOUS les boutons et inputs IMMÉDIATEMENT
            setTimeout(() => {{
                // Désactiver tous les boutons
                document.querySelectorAll('button').forEach(btn => {{
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.pointerEvents = 'none';
                }});
                
                // Désactiver tous les inputs
                document.querySelectorAll('input, select, textarea').forEach(input => {{
                    input.disabled = true;
                    input.style.backgroundColor = '#f8f9fa';
                }});
                
                // Masquer les hints
                document.querySelectorAll('.hint-container, button[onclick*="toggleHint"]').forEach(hint => {{
                    hint.style.display = 'none';
                }});
                
                console.log('[Teacher View] Tous les boutons ont été désactivés');
            }}, 100);
            
        }} else {{
            // Mode apprenant normal
            const token = sessionStorage.getItem(auth.SESSION_KEY);
            student = token ? await auth.findUserByToken(token) : null;

            if (!student) {{
                window.location.href = '../html/login.html';
                return;
            }}

            // Bouton déconnexion (seulement en mode apprenant)
            document.getElementById('logout-btn').addEventListener('click', () => {{
                sessionStorage.removeItem(auth.SESSION_KEY);
                window.location.href = '../html/login.html';
            }});
        }}

        // Afficher les informations utilisateur
        document.getElementById('student-info').style.display = 'block';
        document.querySelector('.student-name').textContent = student.name;
        document.querySelector('.student-class').textContent = student.class || '';
        
        // ✅ Protection anti copier-coller : SEULEMENT POUR LES ELEVES (pas mode formateur)
        if (!isTeacherView) {{
            // Appliquer la protection sur tous les textes de consignes et cours
            document.querySelectorAll('.question-text, .content-box, .hint-content').forEach(el => {{
                el.classList.add('prevent-copy');
            }});
            
            // Bloquer le menu contextuel sur les zones protégées
            document.addEventListener('contextmenu', (e) => {{
                if (e.target.closest('.prevent-copy')) {{
                    e.preventDefault();
                    return false;
                }}
            }});
        }}
    }});
    </script>
</head>
<body class="chapter-page">
    <div class="container">
<header class="chapter-header">
    <div class="chapter-header-spacer"></div>

    <div class="chapter-header-content">
        <h1>{title}</h1>
    </div>

    <div class="chapter-progress-circle" id="chapterProgressCircle">
        <div class="progress-percent-bg">%</div>
        <div class="progress-percent-bg-dup0">%</div>
        <div class="progress-percent-bg-dup1">%</div>
        <div class="progress-value" id="chapterProgressValue">0</div>
    </div>
</header>         

    <div id="student-info" class="student-info" style="display: none;">
        <div class="welcome-message">
        <div class="student-details">
            <div class="student-info-left">
                <span class="student-name"></span>
                <span class="student-class"></span>
            </div>
            <div class="chapter-nav">
                <button class="btn btn-secondary" onclick="window.location.href='../../index.html'">
                    ← Retour au menu
                </button>
                <button id="logout-btn" class="btn btn-secondary">
                    Se déconnecter
                </button>
            </div>
        </div>
        </div>

        <main class="chapter-content">
            {content}
        </main>
        
        <footer class="chapter-footer">
            <div class="progress-actions">
                <button class="btn btn-primary" onclick="window.location.href='../../index.html'">
                    Retour au menu
                </button>
            </div>
        </footer>
    </div>
</body>
</html>
