<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcours Pédagogique - Cours Interactifs</title>

    <script>
    // Détection d'environnement inline (identique à 404.html)
    var _base = ['localhost', '127.0.0.1'].includes(window.location.hostname) ? '' : '/cours-interactifs';

    // Tous les chemins absolus via document.write pour compatibilité GitHub Pages
    document.write('<script src="' + _base + '/src/js/config.js"><\/script>');
    </script>

    <!-- Stocker le slug du parcours dans sessionStorage pour detectSlug() -->
    <script>
    (function() {
        var p = new URLSearchParams(window.location.search).get('parcours');
        if (p) {
            sessionStorage.setItem('parcours:current:slug', p);
        }
    })();
    </script>

    <!-- parcours.js -->
    <script>document.write('<script src="' + _base + '/src/js/parcours.js"><\/script>')</script>

    <!-- Garde d'auth immédiate — avant tout rendu -->
    <script>
    (function() {
        if (!Parcours.token) {
            window.location.replace(Parcours.loginUrl);
        }
    })();
    </script>

    <script>document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/style.css">')</script>
    <script>document.write('<link rel="stylesheet" href="' + _base + '/src/assets/css/index.css">')</script>
</head>
<body style="opacity:0; transition:opacity 0.2s ease;">
    <header>
        <div class="container">
            <h1 id="parcours-title">Parcours Pédagogique</h1>
            <p class="subtitle">Apprenez pas à pas avec des QCM interactifs</p>
        </div>
    </header>

    <main class="container">
        <div id="student-info" class="student-info" style="display:none;">
            <div class="welcome-message">
                <div class="student-details">
                    <div class="student-info-left">
                        <span class="student-name"></span>
                        <span class="student-class"></span>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary">Se Déconnecter</button>
                </div>
            </div>
        </div>

        <section class="course-grid">
            <h2>Chapitres</h2>
            <div class="chapters">
                <!-- Injecté dynamiquement par index.js -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 - Site pédagogique interactif</p>
        </div>
    </footer>

    <!-- Scripts dans l'ordre obligatoire (chemins absolus via document.write) -->
    <script>document.write('<script src="' + _base + '/src/js/storage.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/dataStorage.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/main.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/progressManager.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/core/getExamContext.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/chapitre.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/chapter/chapterBilan.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/correctionModal.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/studentCorrectionModal.js"><\/script>')</script>
    <script>document.write('<script src="' + _base + '/src/js/index.js" type="module"><\/script>')</script>

    <script>
    async function showChapterDetails(chapterId) {
        const token = Parcours.token;
        if (!token) { alert('Veuillez vous connecter.'); return; }
        const auth     = new DataStorage();
        const progress = await auth.getStudentProgress() || {};
        if (typeof showDetailsBilanChapter === 'function') {
            showDetailsBilanChapter(chapterId, progress);
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const auth    = new DataStorage();
        const token   = Parcours.token;
        const student = token ? await auth.findUserByToken(token) : null;

        if (!student) {
            window.location.replace(Parcours.loginUrl);
            return;
        }

        document.body.style.opacity = '1';

        try {
            const r = await fetch((window.BASE || '') + '/parcours/cours.json');
            const data = r.ok ? await r.json() : {};
            const list = data.parcours || [];
            const meta = list.find(p => p.slug === Parcours.slug);
            if (meta) document.getElementById('parcours-title').textContent = meta.label;
        } catch(e) {}

        document.getElementById('student-info').style.display = 'block';
        document.querySelector('.student-name').textContent  = student.name;
        document.querySelector('.student-class').textContent = student.class || '';

        document.getElementById('logout-btn').addEventListener('click', () => {
            Parcours.logout();
        });
    });
    </script>
</body>
</html>
