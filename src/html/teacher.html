<body class="teacher-page">
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <button class="logout-btn-header" id="logout-btn-header" title="Se déconnecter">
                Déconnexion
            </button>
            <h1>Tableau de Bord Formateur</h1>
            <!-- Sélecteur de parcours -->
            <div id="parcours-switcher" style="margin: 0.75rem 0;">
                <label for="parcours-select" style="font-weight:600; margin-right:0.5rem;">Parcours :</label>
                <select id="parcours-select" style="padding:0.4rem 0.75rem; border-radius:6px; border:1px solid #ccc; font-size:1rem; cursor:pointer;">
                    <option value="">— Chargement… —</option>
                </select>
            </div>
            <p id="teacher-name-display">Connecté en tant que : <strong>Chargement...</strong></p>
            <p>Suivi de la progression et des performances de vos apprenants</p>
        </div>

        <!-- Navigation par onglets -->
        <div class="tabs-navigation">
            <button class="tab-btn active" data-tab="chapters">
                📚 Gestion des chapitres
            </button>
            <button class="tab-btn" data-tab="users">
                👥 Gérer les utilisateurs
            </button>
            <button class="tab-btn" data-tab="submissions">
                📬 Rendus à corriger
                <span class="badge" id="submissions-badge" style="display: none;">0</span>
            </button>
            <button class="tab-btn" data-tab="students">
                👥 Suivi apprenants
            </button>
            <button class="tab-btn" data-tab="stats">
                📊 Statistiques
            </button>
        </div>

        <!-- Contenu des onglets -->
        <div class="tabs-content">
            <!-- Onglet Gestion des chapitres -->
            <div id="tab-chapters" class="tab-panel active">
                <div id="chapters-content">
                    <!-- Contenu chargé dynamiquement par teacherChapters.js -->
                </div>
                
                <!-- Zone de danger (uniquement dans l'onglet chapitres) -->
                <div class="danger-zone" style="margin-top: 2rem; display: none;">
                    <h3>⚠️ Zone de Danger</h3>
                    <p>Réinitialiser toutes les réponses et métadonnées de tous les chapitres pour tous les apprenants. Cette action est irréversible.</p>
                    <button class="btn btn-danger" id="reset-all-progress-btn">
                        🗑️ Réinitialiser toutes les progressions
                    </button>
                </div>
            </div>

            <!-- Onglet Gérer les utilisateurs -->
            <div id="tab-users" class="tab-panel">
                <div id="users-content">
                    <!-- Contenu chargé dynamiquement par teacherUsers.js -->
                </div>
            </div>

            <!-- Onglet Rendus à corriger -->
            <div id="tab-submissions" class="tab-panel">
                <div id="submissions-content">
                    <!-- Contenu chargé dynamiquement par teacherSubmissions.js -->
                </div>
            </div>

            <!-- Onglet Apprenants -->
            <div id="tab-students" class="tab-panel">
                <div id="students-content">
                    <!-- Contenu chargé dynamiquement par teacherSubmissions.js -->
                </div>
            </div>

            <!-- Onglet Statistiques -->
            <div id="tab-stats" class="tab-panel">
                <div id="stats-content">
                    <!-- Contenu chargé dynamiquement par teacherStats.js -->
                </div>
            </div>
        </div>
    </div>

    <script>document.write('<script src="' + _base + '/src/js/teacherDashboard.js"><\/script>')</script>
    
    <!-- Script d'initialisation du sélecteur de parcours -->
    <script>
    // ── Rendre slug accessible globalement pour tous les modules ──
    window.currentParcoursSlug = new URLSearchParams(window.location.search).get('parcours') || '';

    (async function initParcoursSwitcher() {
        const select = document.getElementById('parcours-select');
        const current = window.currentParcoursSlug;

        const data = await staticJson.get('/parcours/cours.json');
        if (!data) {
            select.innerHTML = '<option value="">Erreur chargement parcours</option>';
            console.error('[Switcher] Impossible de charger les parcours');
            return;
        }

        const list = data.parcours || [];
        select.innerHTML = '';
        if (!current) {
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = '— Choisir un parcours —';
            placeholder.disabled = true;
            placeholder.selected = true;
            select.appendChild(placeholder);
        }

        list.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.slug;
            opt.textContent = p.label || p.slug;
            if (p.slug === current) opt.selected = true;
            select.appendChild(opt);
        });

        select.addEventListener('change', () => {
            if (select.value) {
                window.location.href = window.location.pathname + '?parcours=' + select.value;
            }
        });
    })();
    </script>
</body>
</html>
