<!-- teacher.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord Formateur - Cours Interactifs</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/teacher.css">
    <!-- SheetJS pour la lecture des fichiers Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../js/core/getExamContext.js"></script>
    <script src="../js/getChapterBadgeState.js"></script>
</head>
<body class="teacher-page" style="opacity: 0; transition: opacity 0.2s ease;">
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <button class="logout-btn-header" id="logout-btn-header" title="Se déconnecter">
                Déconnexion
            </button>
            <h1>Tableau de Bord Formateur</h1>
            <p id="teacher-name-display">Connecté en tant que : <strong>Chargement...</strong></p>
            <p>Suivi de la progression et des performances de vos apprenants</p>
        </div>

        <!-- Navigation par onglets -->
        <div class="tabs-navigation">
            <button class="tab-btn active" data-tab="chapters">
                📚 Gestion des chapitres
            </button>
            <button class="tab-btn" data-tab="users">
                👥 Gérer les utilisateurs
            </button>
            <button class="tab-btn" data-tab="submissions">
                📬 Rendus à corriger
                <span class="badge" id="submissions-badge" style="display: none;">0</span>
            </button>
            <button class="tab-btn" data-tab="students">
                👥 Suivi apprenants
            </button>
            <button class="tab-btn" data-tab="stats">
                📊 Statistiques
            </button>
        </div>

        <!-- Contenu des onglets -->
        <div class="tabs-content">
            <!-- Onglet Gestion des chapitres -->
            <div id="tab-chapters" class="tab-panel active">
                <div id="chapters-content">
                    <!-- Contenu chargé dynamiquement par teacherChapters.js -->
                </div>
                
                <!-- Zone de danger (uniquement dans l'onglet chapitres) -->
                <div class="danger-zone" style="margin-top: 2rem;">
                    <h3>⚠️ Zone de Danger</h3>
                    <p>Réinitialiser toutes les réponses et métadonnées de tous les chapitres pour tous les apprenants. Cette action est irréversible.</p>
                    <button class="btn btn-danger" id="reset-all-progress-btn">
                        🗑️ Réinitialiser toutes les progressions
                    </button>
                </div>
            </div>

            <!-- Onglet Gérer les utilisateurs -->
            <div id="tab-users" class="tab-panel">
                <div id="users-content">
                    <!-- Contenu chargé dynamiquement par teacherUsers.js -->
                </div>
            </div>

            <!-- Onglet Rendus à corriger -->
            <div id="tab-submissions" class="tab-panel">
                <div id="submissions-content">
                    <!-- Contenu chargé dynamiquement par teacherSubmissions.js -->
                </div>
            </div>

            <!-- Onglet Apprenants -->
            <div id="tab-students" class="tab-panel">
                <div id="students-content">
                    <!-- Contenu chargé dynamiquement par teacherSubmissions.js -->
                </div>
            </div>

            <!-- Onglet Statistiques -->
            <div id="tab-stats" class="tab-panel">
                <div id="stats-content">
                    <!-- Contenu chargé dynamiquement par teacherStats.js -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/storage.js"></script>
    <script src="../js/dataStorage.js"></script>
    <script>
    // ✅ ACTIVATION MODE EXAMEN SUR PAGE PROF
    window.globalContext = window.globalContext || {};
    window.globalContext.examMode = true;
    
    // ✅ Vérification IMMEDIATE avant rendu
    (function() {
        // ✅ ATTENDRE CHARGEMENT COMPLET (HTML + CSS + JS + FONTS + IMAGES)
        // On n'affiche la page QUE quand TOUT est 100% chargé et rendu
        window.addEventListener('load', () => {
            // Délai supplémentaire pour être sûr que tous les layouts sont calculés
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 50);
        });
    })();
    </script>
    <script src="../js/chapterDetector.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/progressManager.js"></script>
    
    <!-- Modules du tableau de bord -->
    <script src="../js/correctionModal.js"></script>
    <script src="../js/teacherChapters.js"></script>
    <script src="../js/teacherUsers.js"></script>
    <script src="../js/teacherSubmissions.js"></script>
    <script src="../js/teacherStudents.js"></script>
    <script src="../js/teacherStats.js"></script>
    <script src="../js/teacherDashboard.js"></script>
</body>
</html>
