<!-- src/html/login -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion apprenants - Cours Interactifs</title>
    <base href="/">
    <script src="src/js/config.js"></script>
    <script src="src/js/parcours.js"></script>
    <link rel="stylesheet" href="src/assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .login-container { max-width: 500px; margin: 4rem auto; padding: 2rem; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .login-form { margin-top: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 2px solid #ddd; border-radius: 4px; font-size: 1.1rem; box-sizing: border-box; }
        .form-group input { text-align: center; letter-spacing: 2px; }
        .form-group select { background: white; cursor: pointer; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }
        .help-text { font-size: 0.9rem; color: #666; margin-top: 0.5rem; }
        .teacher-link { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #eee; }
        .teacher-link a { color: #3498db; text-decoration: none; font-weight: bold; }
        .teacher-link a:hover { text-decoration: underline; }
        .parcours-name { font-size: .85rem; color: #888; margin-bottom: .5rem; }
        #parcours-selector { display: none; }
        .error-message {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            background: #fff0f0;
            color: #c0392b;
            border-left: 4px solid #e74c3c;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            white-space: pre-line;
            text-align: center;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-6px); }
            75%       { transform: translateX(6px); }
        }
    </style>
</head>
<body class="login-page" style="opacity: 0; transition: opacity 0.2s ease;">

    <div class="login-container">
        <div class="login-card">
            <h1>Connexion apprenants</h1>
            <p class="parcours-name" id="parcours-name"></p>
            <p>Entrez votre jeton pour accéder à votre espace d'apprentissage</p>

            <div class="login-form">
                <div class="error-message" id="error-message">
                    <span>⚠️</span>
                    <span id="error-text"></span>
                </div>
                <form id="login-form">
                    <div class="form-group" id="parcours-selector">
                        <label for="parcours-select">Choisissez votre parcours :</label>
                        <select id="parcours-select">
                            <option value="">— Sélectionnez un parcours —</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="student-token">Votre jeton d'accès :</label>
                        <input type="text" id="student-token" name="token"
                               placeholder="Ex: STU001" autocomplete="off" required>
                        <div class="help-text">Entrez votre jeton d'accès</div>
                    </div>
                    <button type="submit" class="btn btn-primary"
                            style="width:100%;font-size:1.2rem;padding:1rem;">
                        Se Connecter
                    </button>
                </form>

                <div class="teacher-link">
                    <p>Vous êtes formateur ?</p>
                    <a href="teacher-login.html">Accéder au tableau de bord</a>
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/storage.js"></script>
    <script src="src/js/dataStorage.js"></script>
    <script>
    (function() {
        'use strict';

        const params   = new URLSearchParams(window.location.search);
        const slug     = params.get('parcours') || '';
        const tokenVal = params.get('token') || '';
        const error    = params.get('error') || '';

        // ── Si déjà connecté → retour à la page d'accueil du parcours ──
        // (Évite la boucle 404.html → index.html → 404.html)
        // Note: on utilise la variable slug des params URL car Parcours.slug
        // est vide sur la page login (path /src/html/login.html)
        const existingToken = sessionStorage.getItem('current_student_token');
        if (existingToken && slug) {
            window.location.replace((window.BASE || '') + '/src/html/user.html?parcours=' + encodeURIComponent(slug));
            return;
        }

        // ── Helpers d'affichage d'erreur ───────────────────────────
        function showError(msg) {
            const div = document.getElementById('error-message');
            const txt = document.getElementById('error-text');
            if (!div || !txt) return;
            txt.textContent = msg;
            div.style.display = 'flex';
            // Reset animation
            div.style.animation = 'none';
            div.offsetHeight; // reflow
            div.style.animation = '';
        }

        function hideError() {
            const div = document.getElementById('error-message');
            if (div) div.style.display = 'none';
        }

        // ── Helper : tente la connexion pour un (slug, token) ─────
        // ── Helper : tente la connexion pour un (slug, token) ─────
        async function tryLogin(slug, token) {
            try {
                if (!window.storage) {
                    showError('Stockage non disponible. Réessayez.');
                    return;
                }
                
                // ✅ LOG 1 : Vérifier le slug reçu
                console.log('[Login] tryLogin appelé avec slug:', slug, 'token:', token);
                
                const usersKey = slug + ':teacher:users_list';
                
                // ✅ LOG 2 : Vérifier la clé utilisée
                console.log('[Login] usersKey:', usersKey);
                
                const users = await window.storage.get(usersKey) || [];
                
                // ✅ LOG 3 : Vérifier les utilisateurs trouvés
                console.log('[Login] users trouvés:', users.length);
                
                const found = users.find(u => u.id === token);

                if (found) {
                    sessionStorage.setItem('current_student_token', token);
                    sessionStorage.setItem('parcours:' + slug + ':token', token);
                    
                    // ✅ Rediriger vers la page d'accueil du parcours (liste des chapitres)
                    // window.BASE = "" sur localhost, "/cours-interactifs" sur GitHub Pages
                    const redirectUrl = (window.BASE || '') + '/src/html/user.html?parcours=' + encodeURIComponent(slug);
                    console.log('[Login] Redirection vers:', redirectUrl);
                    
                    window.location.href = redirectUrl;
                } else {
                    showError('Jeton invalide pour ce parcours\nVérifiez votre jeton.');
                }
            } catch (e) {
                console.error('[Login] Erreur :', e);
                showError('Erreur lors de la connexion. Veuillez réessayer.');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            document.body.style.opacity = '1';

            const nameEl    = document.getElementById('parcours-name');
            const selector  = document.getElementById('parcours-selector');
            const form      = document.getElementById('login-form');
            const tokenInput = document.getElementById('student-token');
            const selectEl  = document.getElementById('parcours-select');

            // ── Afficher une erreur si présente dans l'URL ────────
            if (error) {
                showError(error);
            }

            // ── Labels des parcours ────────────────────────────────
            const labels = {
                'nsi-term': 'NSI — Terminale',
                'math-2de': 'Mathématiques — Seconde',
                'snt-1ere': 'SNT — Première',
            };

            // ── Remplacer le formulaire pour supprimer les listeners
            //    de dataStorage.js (qui utilise Parcours.slug = vide) ──
            const newForm = form.cloneNode(false);
            while (form.firstChild) {
                newForm.appendChild(form.firstChild);
            }
            form.parentNode.replaceChild(newForm, form);
            // Récupérer les références mises à jour
            const tokenInput2 = document.getElementById('student-token');
            const selectEl2   = document.getElementById('parcours-select');

            // ── Cacher l'erreur à la saisie ─────────────────────────
            if (tokenInput2) tokenInput2.addEventListener('input', hideError);
            if (selectEl2) selectEl2.addEventListener('change', hideError);

            // ── CAS 1 : parcours présent dans l'URL ────────────────
            if (slug) {
                if (nameEl) {
                    nameEl.textContent = 'Parcours : ' + (labels[slug] || slug);
                }
                if (selector) selector.remove();

                if (tokenVal && tokenInput2) {
                    tokenInput2.value = tokenVal;
                }

                // Connexion automatique si token présent
                if (tokenVal) {
                    await tryLogin(slug, tokenVal);
                }

                // Gestion manuelle du submit
                newForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const token = tokenInput2.value.trim();
                    if (!token) {
                        showError('Veuillez entrer votre jeton d\'accès.');
                        return;
                    }
                    tryLogin(slug, token);
                });

                return;
            }

            // ── CAS 2 : aucun parcours → sélecteur ─────────────────
            if (selector) selector.style.display = 'block';
            if (nameEl) nameEl.textContent = '';

            // Charger /parcours/cours.json
            try {
                const resp = await fetch((window.BASE || '') + '/parcours/cours.json');
                const data = await resp.json();
                const parcoursList = data.parcours.map(p => ({ slug: p.slug, label: p.label }));
                parcoursList.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.slug;
                    opt.textContent = labels[p.slug] || p.label || p.slug;
                    selectEl2.appendChild(opt);
                });
            } catch (e) {
                console.warn('[Login] Impossible de charger les parcours, fallback statique.');
                Object.keys(labels).forEach(slug => {
                    const opt = document.createElement('option');
                    opt.value = slug;
                    opt.textContent = labels[slug];
                    selectEl2.appendChild(opt);
                });
            }

            // Gestion manuelle du submit
            newForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const selected = selectEl2.value;
                const token    = tokenInput2.value.trim();

                if (!selected) {
                    showError('Veuillez choisir un parcours.');
                    return;
                }
                if (!token) {
                    showError('Veuillez entrer votre jeton d\'accès.');
                    return;
                }
                tryLogin(selected, token);
            });
        });
    })();
    </script>
</body>
</html>
